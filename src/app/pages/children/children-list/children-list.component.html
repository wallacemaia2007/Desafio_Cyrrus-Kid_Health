<section class="page-container">
  <app-page-header
    title="Vacinação Infantil"
    subtitle="Localize a criança no sistema para verificar o status de vacinação."
  />

  <section class="page-content">
    @if (children$ | async; as children) {
    <app-paginated-card-grid
      [items]="children"
      [searchFn]="searchChildren"
      [pageSize]="8"
      actionLabel="Nova Criança"
      actionRoute="/children/new"
      searchPlaceholder="Buscar por criança ou responsável..."
      emptyTitle="Nenhuma criança encontrada."
      emptySubtitle="Tente buscar pelo nome da criança ou do responsável."
      emptyIcon="search-outline"
    >
      <ng-template let-child>
        <app-child-card [child]="child" />
      </ng-template>
    </app-paginated-card-grid>
    } @else {
    <app-loading-state message="Buscando informações..." />
    }
  </section>
</section>
