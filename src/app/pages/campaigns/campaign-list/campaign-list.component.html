<section class="page-container">
  <app-page-header title="Campanhas de Vacinação"
    subtitle="Acompanhe campanhas ativas e mantenha a vacinação em dia." />

  <section class="page-content">
    @if (campaigns$ | async; as campaigns) {
    <app-paginated-card-grid [items]="campaigns" [searchFn]="searchCampaigns" [filterOptions]="campaignFilters"
      [pageSize]="8" searchPlaceholder="Buscar por nome da campanha..." emptyTitle="Nenhuma campanha encontrada."
      emptySubtitle="Tente buscar pelo nome da campanha." emptyIcon="search-outline">
      <ng-template let-campaign>
        <app-campaign-card [campaign]="campaign" />
      </ng-template>
    </app-paginated-card-grid>
    } @else {
    <app-loading-state message="Carregando campanhas..." />
    }
  </section>
</section>
