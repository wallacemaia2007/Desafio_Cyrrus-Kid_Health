<section class="page-container">
  <app-page-header title="Detalhes da Campanha" subtitle="Informações completas sobre a campanha de vacinação.">
    <a class="back-link" routerLink="/campaigns">
      <ion-icon name="arrow-back-outline" aria-hidden="true"></ion-icon>
      Voltar
    </a>
  </app-page-header>

  <section class="page-content">
    @if (campaign$ | async; as campaign) {
    <article class="details-card">
      <div class="campaign-card-top">
        <app-status-badge [status]="isActive(campaign) ? 'active' : 'ended'"
          [label]="isActive(campaign) ? 'Em andamento' : 'Encerrada'" />
        <ion-icon name="medkit-outline" aria-hidden="true"></ion-icon>
      </div>

      <h3 class="campaign-title">{{ campaign.title }}</h3>

      <div class="details-body">
        <div class="detail-section">
          <span class="detail-label">Descrição</span>
          <p class="detail-text">{{ campaign.description }}</p>
        </div>

        <div class="detail-section">
          <span class="detail-label">Público-Alvo</span>
          <p class="detail-text">{{ campaign.targetAudience }}</p>
        </div>

        <div class="detail-row">
          <div class="detail-section">
            <span class="detail-label">Início</span>
            <p class="detail-text">{{ campaign.startDate | date:'dd/MM/yyyy' }}</p>
          </div>
          <div class="detail-section">
            <span class="detail-label">Término</span>
            <p class="detail-text">{{ campaign.endDate | date:'dd/MM/yyyy' }}</p>
          </div>
        </div>

        <div class="detail-section">
          <span class="detail-label">Status</span>
          <app-status-badge [status]="isActive(campaign) ? 'active' : 'ended'"
            [label]="isActive(campaign) ? 'Ativa' : 'Encerrada'" />
        </div>
      </div>
    </article>
    } @else {
    <app-loading-state />
    }
  </section>
</section>
