<ion-header [translucent]="true" class="ion-no-border">
    <ion-toolbar class="transition-all duration-300" [class.header-scrolled]="isScrolled()">
        <div class="container mx-auto flex max-w-7xl items-center justify-between px-4">

            <ion-buttons slot="start">
                <a routerLink="/" (click)="scrollTo($event, '#hero')"
                    class="group flex items-center gap-3 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary rounded-lg"
                    aria-label="Ir para o início">
                    <span
                        class="flex h-10 w-10 md:h-12 md:w-12 items-center justify-center rounded-full bg-primary text-lg font-bold text-white shadow-sm transition-transform duration-200 group-hover:scale-110">
                        KH
                    </span>
                    <span
                        class="hidden sm:block text-lg md:text-xl font-extrabold tracking-tight text-dark transition-colors group-hover:text-primary">
                        Kid Health
                    </span>
                </a>
            </ion-buttons>

            <nav class="hidden md:block flex-1 px-8">
                <ul class="flex items-center justify-center gap-1">
                    @for (link of navLinks; track trackByLabel($index, link)) {
                    <li>
                        <a [routerLink]="link.route" routerLinkActive="text-primary bg-primary/10"
                            [routerLinkActiveOptions]="{exact: link.route === '/'}"
                            class="relative px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-300 text-dark hover:text-primary hover:bg-primary/10">
                            {{ link.label }}
                        </a>
                    </li>
                    }
                </ul>
            </nav>

            <ion-buttons slot="end">

                <ion-button (click)="toggleMenu()" class="md:hidden text-dark"
                    [attr.aria-label]="isMenuOpen() ? 'Fechar Menu' : 'Abrir Menu'">
                    <ion-icon slot="icon-only" [name]="isMenuOpen() ? 'close-outline' : 'menu-outline'"></ion-icon>
                </ion-button>
            </ion-buttons>

        </div>
    </ion-toolbar>
</ion-header>

<ion-menu side="end" menuId="main-menu" contentId="main-content" class="mobile-drawer">
    <ion-header class="ion-no-border">
        <ion-toolbar class="px-4 py-2 border-b border-white/10 bg-dark">
            <div class="flex items-center justify-between w-full">
                <div class="flex items-center gap-3">
                    <span
                        class="flex h-9 w-9 items-center justify-center rounded-full bg-primary text-sm font-bold text-white">KH</span>
                    <span class="font-bold text-white text-sm">Kid Health</span>
                </div>
                <ion-buttons slot="end">
                    <ion-button (click)="closeMenu()" aria-label="Fechar Menu" class="text-white/70">
                        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
                    </ion-button>
                </ion-buttons>
            </div>
        </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding bg-dark">
        <ion-list lines="none" class="bg-transparent">
            @for (link of navLinks; track trackByLabel($index, link)) {
            <ion-item class="mb-2 rounded-xl transition-all duration-200"
                (click)="link.route ? closeMenu() : scrollTo($event, link.href!)" button detail="false">
                <ion-label class="text-sm font-semibold text-white">
                    {{ link.label }}
                </ion-label>
            </ion-item>
            }
        </ion-list>
    </ion-content>
</ion-menu>
