<ion-footer>
  <ion-toolbar>
    <ion-grid class="footer-grid">
      <ion-row>
        <ion-col size="12" sizeMd="6" sizeLg="4">
          <div class="footer-brand">
            <div class="brand-header">
              <ion-icon name="medkit-outline" aria-hidden="true"></ion-icon>
              <span class="brand-name">{{ appName() }}</span>
            </div>
            <p class="brand-description">{{ appDescription() }}</p>
          </div>
        </ion-col>

        <ion-col size="12" sizeMd="6" sizeLg="4">
          <h3 class="footer-section-title">Links</h3>
          <ion-list class="footer-list">
            @for (link of navigationLinks; track link.route) {
            <ion-item class="footer-item" lines="none">
              <ion-icon [name]="link.icon" slot="start" aria-hidden="true"></ion-icon>
              <a [routerLink]="link.route" class="footer-link" [attr.aria-label]="'Ir para ' + link.label">
                {{ link.label }}
              </a>
            </ion-item>
            }
          </ion-list>
        </ion-col>

        <ion-col size="12" sizeMd="6" sizeLg="4">
          <h3 class="footer-section-title">Informações</h3>
          <ion-list class="footer-list">
            <ion-item class="footer-item" lines="none">
              <ion-icon name="shield-checkmark-outline" slot="start" aria-hidden="true"></ion-icon>
              <span class="footer-text">Versão {{ appVersion() }}</span>
            </ion-item>
            <ion-item class="footer-item" lines="none">
              <ion-icon name="calendar-outline" slot="start" aria-hidden="true"></ion-icon>
              <span class="footer-text">&copy; {{ currentYear() }} {{ appName() }}. Todos os direitos reservados.</span>
            </ion-item>
          </ion-list>
        </ion-col>
      </ion-row>
    </ion-grid>

    <div class="footer-bottom">
      <ion-text color="medium">
        <p>Desenvolvido com Angular, Ionic e Firebase por <a href="https://www.maiawall.com" target="_blank"
            rel="noopener noreferrer" class="footer-link">Wallace Maia</a></p>
      </ion-text>
    </div>
  </ion-toolbar>
</ion-footer>
