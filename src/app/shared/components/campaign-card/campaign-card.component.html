<article class="campaign-card" [routerLink]="['/campaigns', campaign().id]">
  <div class="campaign-card-top">
    <app-status-badge [status]="campaign().active ? 'active' : 'ended'" [label]="campaign().active ? 'Em andamento' : 'Encerrada'" />
    <ion-icon name="medkit-outline" aria-hidden="true"></ion-icon>
  </div>

  <h3 class="campaign-title">{{ campaign().title }}</h3>
  <p class="campaign-description">{{ campaign().description }}</p>

  <div class="campaign-footer">
    <span class="campaign-audience">
      <ion-icon name="people-outline" aria-hidden="true"></ion-icon>
      {{ campaign().targetAudience }}
    </span>
    <span class="campaign-date">
      até {{ campaign().endDate | date:'dd/MM/yyyy' }}
    </span>
  </div>
</article>
