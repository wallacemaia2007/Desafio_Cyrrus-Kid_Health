<div class="summary-card">
  <div class="summary-stats">
    @for (stat of stats(); track stat.label; let last = $last) {
    <div class="stat">
      <span class="stat-value">{{ stat.value }}</span>
      <span class="stat-label">{{ stat.label }}</span>
    </div>
    @if (!last) {
    <div class="stat-divider"></div>
    }
    }
  </div>
</div>
